services:
  # ── C# Skill Service ──────────────────────────────────────────────────────────
  skill-service:
    build:
      context: ./SkillService
    environment:
      - ASPNETCORE_URLS=http://+:8080
      # Override credentials via environment variables.
      # These must match SKILL_API_KEY and SKILL_HMAC_SECRET in the gateway.
      - Clients__0__ApiKey=${SKILL_API_KEY:-gw-api-key-change-me}
      - Clients__0__HmacSecret=${SKILL_HMAC_SECRET:-gw-hmac-secret-change-me}
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── AI Gateway (Node.js) ──────────────────────────────────────────────────────
  ai-gateway:
    build:
      context: ./ai-gateway
    env_file:
      - .env
    environment:
      # Override SKILL_URL to reach the skill-service container
      - SKILL_URL=http://skill-service:8080
    ports:
      - "3000:3000"
    depends_on:
      skill-service:
        condition: service_healthy
